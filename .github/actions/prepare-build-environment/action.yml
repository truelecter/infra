name: Prepare build environment
description: Install Nix, Attic client, and configure Attic cache for CI

inputs:
  attic-push-token:
    description: Token for pushing to Attic (ATTIC_PUSH_TOKEN)
    required: true
  github-token:
    description: GitHub token for Nix access-tokens (typically secrets.GITHUB_TOKEN)
    required: true

runs:
  using: composite
  steps:
    - name: Install Nix
      uses: cachix/install-nix-action@v30
      with:
        nix_path: nixpkgs=channel:nixos-26.05
        extra_nix_config: |
          access-tokens = github.com=${{ inputs.github-token }}
          substituters = https://nix-proxy.tlctr.me https://cache.nixos.org/ https://nix-cache.tlctr.me/workflows
          trusted-public-keys = nix-proxy.tlctr.me:o0mf52dfc6glFzwRRquMmGaphNAidwF6L/q2IFyB9qk= workflows:nGqDVYKhDZxnNXIemS1/Bq2+i1wwQ6GE/xG2OIiMNDw= cuda-maintainers.cachix.org-1:0dq3bujKpuEPMCX6U4WylrUDZ9JyUG0VpVZa7CNfq5E= mic92.cachix.org-1:gi8IhgiT3CYZnJsaW7fxznzTkMUOn1RY4GmXdT/nXYQ= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs= nrdxp.cachix.org-1:Fc5PSqY2Jm1TrWfm88l6cvGWwz3s93c6IOifQWnhNW4= truelecter.cachix.org-1:bWHkQ/OM0MLHB9L6gftyaawCrEYkeZyygAcuojwslE0= nabam-nixos-rockchip.cachix.org-1:BQDltcnV8GS/G86tdvjLwLFz1WeFqSk7O9yl+DR0AVM=

    - name: Install Attic with chunking support
      shell: bash
      run: |
        nix profile install github:ByteZ1337/attic/feat/upload-in-parts#attic-client

    - name: Setup Attic cache
      uses: ryanccn/attic-action@v0.4.1
      with:
        endpoint: https://nix-cache.tlctr.me/
        cache: workflows
        token: ${{ inputs.attic-push-token }}
