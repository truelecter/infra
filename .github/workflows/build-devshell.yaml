name: Build devshell
on:
  push:
  workflow_dispatch:

jobs:
  build_shell:
    strategy:
      fail-fast: false
      matrix:
        os:
        - ubuntu-22.04
        - macos-14
    runs-on: ${{ matrix.os }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Install Nix
      uses: cachix/install-nix-action@v30
      with:
        nix_path: nixpkgs=channel:nixos-25.11
        extra_nix_config: |
          access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
          substituters = https://nix-proxy.tlctr.me https://cache.nixos.org/
          trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= nix-proxy.tlctr.me:o0mf52dfc6glFzwRRquMmGaphNAidwF6L/q2IFyB9qk=

    - name: Install Attic with chunking support
      run: |
        nix profile install github:ByteZ1337/attic/feat/upload-in-parts#attic-client

    # - uses: cachix/cachix-action@v15
    #   with:
    #     name: truelecter
    #     extraPullNames: cuda-maintainers, mic92, nix-community, nrdxp, nixos-raspberrypi
    #     authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

    - name: Setup Attic cache
      uses: ryanccn/attic-action@v0.4.1
      with:
        endpoint: https://nix-cache.tlctr.me/
        cache: workflows
        token: ${{ secrets.ATTIC_PUSH_TOKEN }}

    - name: Build shell
      run: |
        nix develop --command "menu"

  shells_aggregated:
    if: ${{ always() }}
    runs-on: ubuntu-latest
    needs: [build_shell]
    steps:
    - run: exit 1
      # see https://stackoverflow.com/a/67532120/4907315
      if: >-
        ${{
          contains(needs.*.result, 'failure')
          || contains(needs.*.result, 'cancelled')
          || contains(needs.*.result, 'skipped')
        }}