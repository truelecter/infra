default:
  - printer_name: ""
  - navigation_path: "/lovelace/3d-printer"
  - camera_view_entity: "input_boolean.3d_printer_camera_view"
  - current_print_state: "sensor.moonraker_current_print_state"
  - print_progress: "sensor.moonraker_print_progress"
  - filename: "sensor.moonraker_filename"
  - extruder_temperature: "sensor.moonraker_extruder_temperature"
  - bed_temperature: "sensor.moonraker_bed_temperature"
  - printing: "binary_sensor.moonraker_printing"
  - print_duration: "sensor.moonraker_print_duration"
  - estimated_finish_time: "sensor.moonraker_estimated_finish_time"
  - pause_print: "button.moonraker_pause_print"
  - resume_print: "button.moonraker_resume_print"
  - emergency_stop: "button.moonraker_emergency_stop"
  - camera: "camera.moonraker_camera"
  - thumbnail: "camera.moonraker_thumbnail"
card:
  type: custom:stack-in-card
  cards:
    - type: custom:mushroom-template-card
      entity: "[[camera_view_entity]]"
      primary: "[[printer_name]]"
      tap_action:
        action: toggle
      hold_action:
        action: navigate
        navigation_path: "[[navigation_path]]"
      secondary: >-
        {% if is_state('[[current_print_state]]','printing') or
        is_state('[[current_print_state]]','resuming') or
        is_state('[[current_print_state]]','pausing') or
        is_state('[[current_print_state]]','paused') %} {{
        (states('[[print_progress]]') | default(0) | string | float |
        round(0)) }}% {{states('[[current_print_state]]')}}
          {% set list = states('[[filename]]').split('_') %}
          {{list[list | length-3]}}
        {% else %}
          {{states('[[current_print_state]]')}}
        {% endif %}
      icon: >-
        {% if is_state('[[current_print_state]]','standby') or
        is_state('[[current_print_state]]','ready') %}
          mdi:printer-3d
        {% elif is_state('[[current_print_state]]','printing') or
        is_state('[[current_print_state]]','resuming') or
        is_state('[[current_print_state]]','pausing') or
        is_state('[[current_print_state]]','paused') %}
          mdi:printer-3d-nozzle
        {% elif is_state('[[current_print_state]]','cancelled') or
        is_state('[[current_print_state]]','error') or
        is_state('[[current_print_state]]','cancelling') %}
          mdi:close-octagon
        {% elif is_state('[[current_print_state]]','unavailable') or
        is_state('[[current_print_state]]','unknown') %}
          mdi:printer-3d-off
        {% endif %}
      icon_color: >-
        {% if is_state('[[current_print_state]]','paused') or
        is_state('[[current_print_state]]','pausing') %}
          #fc6d09
        {% elif is_state('[[current_print_state]]','cancelling') or
        is_state('[[current_print_state]]','error') or
        is_state('[[current_print_state]]','cancelled') %}
          red
        {% else %}
          var(--primary-text-color)
        {% endif %}
      badge_icon: >-
        {% if is_state('[[current_print_state]]','paused') or
        is_state('[[current_print_state]]','pausing') %}
          mdi:pause
        {% elif is_state('[[current_print_state]]','resuming') %}
          mdi:play
        {% endif %}
      badge_color: >-
        {% if is_state('[[current_print_state]]','paused') or
        is_state('[[current_print_state]]','pausing') %}
          grey
        {% elif is_state('[[current_print_state]]','resuming') %}
          green
        {% endif %}
      card_mod:
        style:
          mushroom-shape-icon$: |
            .shape {
              {% if is_state('[[current_print_state]]','printing') or is_state('[[current_print_state]]','resuming') %}
                background: radial-gradient(var(--card-background-color) 60%, transparent 0%), conic-gradient(rgb(252,109,9) {% if states('[[print_progress]]') | is_number %}{{ states('[[print_progress]]') | default (0) | float | round(0) }}{% else %}0{% endif %}% 0%, var(--card-background-color) 0% 100%);
              {% elif is_state('[[current_print_state]]','standby') or is_state('[[current_print_state]]','ready') %}
                background: radial-gradient(var(--card-background-color) 60%, transparent 0%), conic-gradient(rgb(53,190,37) 100% 0%, var(--card-background-color) 0% 100%);
              {% elif is_state('[[current_print_state]]','cancelling') or is_state('[[current_print_state]]','error') or is_state('[[current_print_state]]','cancelled')%}
                background: radial-gradient(var(--card-background-color) 60%, transparent 0%), conic-gradient(red 100% 0%, var(--card-background-color) 0% 100%);
              {% else %}
                background: radial-gradient(var(--card-background-color) 60%, transparent 0%), conic-gradient(#9e9e9e {% if states('[[print_progress]]') | is_number %}{{ states('[[print_progress]]') | default (0) | float | round(0) }}{% else %}0{% endif %}% 0%, var(--card-background-color) 0% 100%);
              {% endif %}
            }
            .shape:after {
              content: "";
              height: 100%;
              width: 100%;
              position: absolute;
              border-radius: 50%;
            }
          .: |
            ha-state-icon {
              {% if is_state('[[current_print_state]]','printing') or
              is_state('[[current_print_state]]','resuming')%}
                clip-path: inset(83% 72% 0 0);
              {% endif %}
            }
            ha-card {
              border: none;
            }
            mushroom-badge-icon {
              {% if is_state('[[current_print_state]]','pausing') or
              is_state('[[current_print_state]]','paused')%}
                animation: pulse 2s infinite;
              {% endif %}
            }
    - type: custom:mushroom-chips-card
      chips:
        - type: template
          content: >-
            {% if states('[[extruder_temperature]]') not in ['unknown', 'unavailable', 'none'] %}
              {{ (states('[[extruder_temperature]]') | float | round(1)) }} °C
            {% else %}
              -- °C
            {% endif %}
          icon: mdi:printer-3d-nozzle-heat
          entity: "[[extruder_temperature]]"
          tap_action:
            action: more-info
          hold_action:
            action: navigate
            navigation_path: "[[navigation_path]]"
          card_mod:
            style: |
              ha-card {
                border: none;
              }
        - type: template
          content: >-
            {% if states('[[bed_temperature]]') not in ['unknown', 'unavailable', 'none'] %}
              {{ (states('[[bed_temperature]]') | float | round(1)) }} °C
            {% else %}
              -- °C
            {% endif %}
          icon: mdi:heating-coil
          entity: "[[bed_temperature]]"
          tap_action:
            action: more-info
          hold_action:
            action: navigate
            navigation_path: "[[navigation_path]]"
          card_mod:
            style: |
              ha-card {
                border: none;
              }
        - type: conditional
          conditions:
            - condition: state
              entity: "[[printing]]"
              state: "on"
          chip:
            type: template
            content: >-
              {% set time = states('[[print_duration]]') | default(0) |
              int %} {% set minutes = ((time % 3600) / 60) | int %} {% set hours =
              ((time % 86400) / 3600) | int %} {% set days = (time / 86400) | int
              %} {%- if time < 60 -%}
                Less than a minute
              {%- else -%}
                {%- if days > 0 -%}
                  {{ days }}d
                {%- endif -%}
                {%- if hours > 0 -%}
                  {%- if days > 0 -%}
                    {{ ' ' }}
                  {%- endif -%}
                  {{ hours }}h
                {%- endif -%}
                {%- if minutes > 0 -%}
                  {%- if days > 0 or hours > 0 -%}
                    {{ ' ' }}
                  {%- endif -%}
                  {{ minutes }}m
                {%- endif -%}
              {%- endif -%}
            icon: mdi:timer-outline
            entity: "[[print_duration]]"
            tap_action:
              action: more-info
            hold_action:
              action: navigate
              navigation_path: "[[navigation_path]]"
            card_mod:
              style: |
                ha-card {
                border: none;
                }
        - type: conditional
          conditions:
            - condition: state
              entity: "[[printing]]"
              state: "on"
          chip:
            type: template
            content: >
              {% if states('[[estimated_finish_time]]') !=
              'unavailable' and now().day ==
              as_timestamp(states('[[estimated_finish_time]]')) |
              timestamp_custom('%d') | int %}
                Today {{as_timestamp(states('[[estimated_finish_time]]')) | timestamp_custom ('%H:%M') }}
              {% elif now().day <
              as_timestamp(states('[[estimated_finish_time]]')) |
              timestamp_custom('%d') | int %}
                Tmrw {{as_timestamp(states('[[estimated_finish_time]]')) | timestamp_custom ('%H:%M') }}
              {% elif utcnow().day >
              as_timestamp(states('[[estimated_finish_time]]')) |
              timestamp_custom('%d') | int %}
                Null
              {% else %}
                {{as_timestamp(states('[[estimated_finish_time]]')) | timestamp_custom ('%b %d %H:%M') }}
              {% endif %}
            icon: mdi:clock-check-outline
            entity: "[[estimated_finish_time]]"
            tap_action:
              action: more-info
            hold_action:
              action: navigate
              navigation_path: "[[navigation_path]]"
            card_mod:
              style: |
                ha-card {
                  border: none;
                }
    - type: custom:mushroom-chips-card
      chips:
        - type: conditional
          conditions:
            - condition: or
              conditions:
                - condition: state
                  entity: "[[current_print_state]]"
                  state: printing
                - condition: state
                  entity: "[[current_print_state]]"
                  state: resuming
          chip:
            type: entity
            entity: "[[pause_print]]"
            icon_color: white
            icon: mdi:pause
            content_info: none
            tap_action:
              action: toggle
            card_mod:
              style: |
                ha-card {
                  --chip-background: rgba(var(--rgb-grey), 0.7);
                  --icon-color: rgb(var(--rgb-white));
                }
        - type: conditional
          conditions:
            - condition: or
              conditions:
                - condition: state
                  entity: "[[current_print_state]]"
                  state: paused
                - condition: state
                  entity: "[[current_print_state]]"
                  state: pausing
          chip:
            type: entity
            entity: "[[resume_print]]"
            icon_color: white
            icon: mdi:play
            content_info: none
            tap_action:
              action: toggle
            card_mod:
              style: |
                ha-card {
                  --chip-background: rgba(var(--rgb-green), 0.7);
                  --icon-color: rgb(var(--rgb-white));
                }
        - type: conditional
          conditions:
            - condition: or
              conditions:
                - condition: state
                  entity: "[[current_print_state]]"
                  state: printing
                - condition: state
                  entity: "[[current_print_state]]"
                  state: pausing
                - condition: state
                  entity: "[[current_print_state]]"
                  state: paused
                - condition: state
                  entity: "[[current_print_state]]"
                  state: resuming
          chip:
            type: entity
            entity: "[[emergency_stop]]"
            icon_color: white
            icon: mdi:alert-octagon
            content_info: none
            tap_action:
              action: toggle
            card_mod:
              style: |
                ha-card {
                  --chip-background: rgba(var(--rgb-red), 1);
                }
      card_mod:
        style: |
          ha-card {
            --chip-box-shadow: none;
            top: 16px;
            width: -webkit-fill-available;
            right: 12px;
            position: absolute;
          }
          .chip-container {
            right: 0px;
            position: absolute;
          }
    - type: conditional
      conditions:
        - condition: or
          conditions:
            - condition: state
              entity: "[[current_print_state]]"
              state: printing
            - condition: state
              entity: "[[current_print_state]]"
              state: resuming
      card:
        type: custom:mushroom-template-card
        icon: mdi:printer-3d-nozzle
        icon_color: var(--primary-text-color)
        entity: "[[camera_view_entity]]"
        tap_action:
          action: toggle
        hold_action:
          action: navigate
          navigation_path: "[[navigation_path]]"
        card_mod:
          style:
            mushroom-shape-icon$: |
              .shape {
                --shape-color: none;
              }
            .: |
              ha-card {
                position: absolute;
                top: 0px;
                border: none;
              }
              ha-state-icon {
                animation: print 1s linear infinite alternate;
              }
              @keyframes print {
                0% { transform: translateX(4px); }
                30% { clip-path: polygon(0 0, 100% 0%, 100% 100%, 0 100%, 0 26%); }
                100% { transform: translateX(-4px); clip-path: polygon(0 0, 100% 0%, 100% 100%, 40% 100%, 0 26%); }
              }
    - type: conditional
      conditions:
        - condition: state
          entity: "[[camera_view_entity]]"
          state: "on"
      card:
        type: custom:swipe-card
        reset_after: 5
        start_card: 1
        parameters:
          slidesPerView: 2
          preloadImages: true
          effect: flip
          pagination:
            type: bullets
        cards:
          - type: picture-entity
            entity: "[[camera]]"
            show_name: false
            show_state: false
            camera_view: live
            aspect_ratio: "4:3"
          - type: picture-entity
            entity: "[[thumbnail]]"
            show_state: false
            show_name: false
            aspect_ratio: "4:3"
  card_mod:
    style: |
      ha-card {

      }

